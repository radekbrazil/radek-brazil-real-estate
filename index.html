<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Radek Brazil | Arizona Real Estate Agent</title>
    <meta name="description" content="Radek Brazil is a licensed Arizona real estate agent helping buyers and sellers across the greater Phoenix area. Find your dream home today." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:title" content="Radek Brazil | Arizona Real Estate Agent" />
    <meta property="og:description" content="Licensed Arizona real estate agent helping buyers and sellers across the greater Phoenix area." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=1200&q=80" />

    <!-- Fonts: Playfair Display + Lato from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hidden forms for Netlify form detection (React renders them client-side;
         Netlify needs to see them in the static HTML at build time) -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <select name="interest"></select>
      <textarea name="message"></textarea>
    </form>

    <form name="hot-deals-lead" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="hot-deals-lead" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <select name="intent"></select>
    </form>
  </body>
</html>
